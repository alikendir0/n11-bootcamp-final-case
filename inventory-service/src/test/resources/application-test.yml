# Test profile — disables Eureka/config-server lookup; Testcontainers Postgres
# supplies datasource via @ServiceConnection. Flyway runs the full V1+V2+V3 chain
# against the test container so the seed data lands and the schema is created.
spring:
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
  config:
    import: ""
  datasource:
    hikari:
      # Set search_path so unqualified native queries (e.g. SELECT * FROM stock)
      # resolve to the inventory schema. In production this is set by init.sh for inventory_user.
      connection-init-sql: "SET search_path = inventory"
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: inventory
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: inventory
    default-schema: inventory
    create-schemas: true     # Testcontainers: schema must be created (no init.sh in test container)
    placeholders:
      schema: inventory
      flyway.schema: inventory
  rabbitmq:
    listener:
      simple:
        auto-startup: false   # don't start consumers in unit tests

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
