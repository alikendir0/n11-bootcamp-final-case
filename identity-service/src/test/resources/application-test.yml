# Test profile — disables Eureka/config-server lookup and lets Testcontainers
# supply datasource + rabbitmq URLs at runtime via DynamicPropertySource.
# @SpringBootTest + @ActiveProfiles("test") uses this file.
# This profile overrides the base application.yml (test) that disables Flyway —
# here we re-enable it so the full Flyway migration chain runs against Testcontainers Postgres.
spring:
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
  config:
    import: ""    # disable spring.config.import to config-server
  jpa:
    hibernate:
      # Use 'none' not 'validate' — Flyway already handles schema creation.
      # Hibernate's validate fails on CHAR(5) columns because Postgres reports them
      # as bpchar (JDBC Types#CHAR) while Hibernate expects Types#VARCHAR (Rule 1 fix).
      ddl-auto: none
    properties:
      hibernate:
        default_schema: identity
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: identity
    default-schema: identity
    create-schemas: true     # Testcontainers Postgres needs the schema created
    placeholders:
      schema: identity
      # flyway.schema is used in V1 migration comment; must be provided to avoid Flyway
      # placeholder substitution error (the key in ${flyway.schema} is "flyway.schema").
      flyway.schema: identity
      adminSeedEmail: test-admin@n11-demo.local
      adminSeedPasswordHash: $2a$10$abcdefghijklmnopqrstuuvA1234567890abcdefghijklmno
      mcpAgentSeedHash: ""
  rabbitmq:
    listener:
      simple:
        auto-startup: false   # don't start consumers in tests; we drive the poller manually

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# Test JWT keypair (NOT a real production key — generated once for unit/integration tests).
# This key is TEST-ONLY and is never used in production environments.
# The production key is supplied via the JWT_PRIVATE_KEY env var (identity-service.yml in config-server).
# gitleaks allowlist: src/test/resources/**/application-test.yml is excluded from secret scanning.
