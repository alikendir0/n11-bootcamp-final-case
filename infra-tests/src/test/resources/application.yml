# infra-tests/src/test/resources/application.yml
# Overrides payment-service's application.yml for the SagaHappyPathE2ETest context.
# Prevents config-server bootstrap failure (spring-cloud-starter-config not on infra-tests classpath).
spring:
  config:
    import: ""
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
  datasource:
    hikari:
      # Set search_path so unqualified native queries resolve to the payment schema.
      connection-init-sql: "SET search_path = payment, public"
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: payment
  flyway:
    # Must be enabled so payment schema (payment.outbox, payment.payments, payment.processed_events)
    # is created in the Testcontainers Postgres for the SagaHappyPathE2ETest.
    # Use db/migration/payment (infra-tests test resources) NOT classpath:db/migration — the latter
    # finds migrations from ALL JARs on classpath (payment-service AND inventory-service both have
    # V1+V2 at that path, causing FlywayException: Found more than one migration with version 2).
    enabled: true
    locations: classpath:db/migration/payment
    schemas: payment
    default-schema: payment
    create-schemas: true    # Testcontainers Postgres has no init.sh; schema must be created
    placeholders:
      flyway.schema: payment  # resolves ${flyway.schema} placeholder in migration SQL comments
  rabbitmq:
    listener:
      simple:
        # auto-startup: true so the StockReservedConsumer actually fires and processes AMQP messages.
        # The E2E test needs the listeners running (unlike per-service unit tests where direct invoke
        # avoids the full listener lifecycle).
        auto-startup: true

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
