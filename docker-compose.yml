      start_period: 25s
    restart: unless-stopped
    networks:
      - n11-net

  # ---------------------------------------------------------------------------
  # mcp-server -- Phase 9 (port 8090).
  # Re-exposes the agent-toolset over the MCP wire protocol via Spring AI 1.1.5.
  # Streamable HTTP is the docker-compose transport (D-01 / D-02); stdio is
  # available via SAME image when launched by Claude Desktop with `docker run -i`
  # (D-04). MCP_API_KEY is exchanged for an internal JWT against identity-service
  # at first tool call (D-07 / Plan 09-04 AgentJwtCache).
  # No postgres dep (stateless), no AMQP dep (no events).
  # Requires: ./gradlew :mcp-server:jibDockerBuild before docker compose up
  # ---------------------------------------------------------------------------
  mcp-server:
    image: ${IMAGE_REGISTRY:-n11}/mcp-server:${IMAGE_TAG:-dev}
    container_name: n11-mcp-server
    profiles: ["full"]
    env_file:
      - .env
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888?fail-fast=true&max-attempts=10&max-interval=1500&multiplier=1.2&initial-interval=1100
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_PROFILES_ACTIVE: docker
      # D-01: compose runs HTTP transport. Claude Desktop overrides via `docker run -e`.
      MCP_TRANSPORT: http
      MCP_STDIO_ENABLED: "false"
      # D-08: API key injected from .env (gitignored). The placeholder default
      # `${MCP_API_KEY:-}` allows compose to start even when .env is missing,
      # but mcp-server's AgentJwtClient throws IllegalStateException if the key
      # is empty when the first tool call arrives (Plan 09-04 Task 1).
      MCP_API_KEY: ${MCP_API_KEY:-}
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8090/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 25s
    restart: unless-stopped
    networks:
      - n11-net

  # ---------------------------------------------------------------------------
  # frontend -- Phase 11 storefront demo surface.
  # Vite 8 + React 19 SPA served in dev mode for local demo.
  # Bind-mounts the local frontend/ directory so hot-reload works during dev.
  # ---------------------------------------------------------------------------
  frontend:
    image: node:24-alpine
    container_name: n11-frontend
    profiles: ["full"]
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:9090}
    ports:
      - "8083:5173"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - n11-net

volumes:
  postgres-data:
  rabbitmq-data:

networks:
  n11-net:
    driver: bridge
    name: n11-net
