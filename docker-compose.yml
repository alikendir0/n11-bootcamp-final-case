      start_period: 25s
    restart: unless-stopped
    networks:
      - n11-net

  # ---------------------------------------------------------------------------
  # ai-service -- Phase 8 (port 8088).
  # Chat assistant (REST + SSE). Calls product/cart/order/payment via
  # Eureka discovery + X-User-Id forwarding (CONTEXT D-05).
  # Requires: ./gradlew :ai-service:jibDockerBuild before docker compose up
  # ---------------------------------------------------------------------------
  ai-service:
