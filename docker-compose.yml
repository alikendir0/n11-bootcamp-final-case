  # ---------------------------------------------------------------------------
  # order-service -- Phase 5 order (port 8085).
  # Image: ./gradlew :order-service:jibDockerBuild
  # Sync REST deps: cart-service (GET /cart), product-service (GET /products/{id} for
  # re-validation), identity-service (GET /addresses/{id} for D-04 snapshot).
  # ---------------------------------------------------------------------------
  order-service:
    image: ${IMAGE_REGISTRY:-n11}/order-service:${IMAGE_TAG:-dev}
