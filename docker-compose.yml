      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_PATH_PREFIX: /api/v1
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 25s
    restart: unless-stopped
    networks:
      - n11-net

  # ---------------------------------------------------------------------------
  # cart-service -- Phase 5 cart (port 8084).
  # Image: ./gradlew :cart-service:jibDockerBuild
  # NO `ports:` mapping — Pitfall #14 (gateway-only entry).
  # Sync REST dep on product-service (D-01 snapshot fetch on add/update).
  # ---------------------------------------------------------------------------
  cart-service:
    image: ${IMAGE_REGISTRY:-n11}/cart-service:${IMAGE_TAG:-dev}
    container_name: n11-cart-service
    profiles: ["full"]
    env_file:
      - .env
    environment:
