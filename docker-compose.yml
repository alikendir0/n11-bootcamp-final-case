# docker-compose.yml — Phase 1 infra-only profile (D-13).
#
# Phase 1 ships postgres + rabbitmq only. eureka-server, config-server, api-gateway are
# added in Plans 05-06; the 10 business services run from IDE/`:bootRun` against this
# infra during dev. Phase 11 will extend this same compose file with a `full` profile
# that adds business services as Jib images (DEV-07's full multi-service compose).
#
# Boundary model (per CONTEXT.md D-01..D-04 + PATTERNS Cross-Cutting #7):
#   - postgres exposes one DB `n11` with 10 schemas (one per stateful service)
#   - init.sh (mounted read-only) creates the schemas, users, search_path, deny matrix
#   - the order-service schema is named `orders` (plural -- `order` is SQL reserved)
#
# Threat-model surfaces this addresses:
#   - T-01-01: all passwords from .env (gitignored) -- never hardcoded
#   - T-01-02: postgres role-level deny enforced inside init.sh
#   - T-01-03: pgvector extension created in init.sh as superuser; service users get
#              USAGE only on `public` (for pgvector types), no superuser leakage
#   - T-01-05: RabbitMQ default guest/guest creds disabled via RABBITMQ_DEFAULT_USER/PASS

name: n11

services:
  postgres:
    image: pgvector/pgvector:pg16
    # Why pgvector/pgvector:pg16 (not plain postgres:16): saves the manual
    # CREATE EXTENSION step at scale and pins pgvector to a known-good 0.8.x version.
    # [VERIFIED: github.com/pgvector/pgvector#docker; STACK.md row.]
    container_name: n11-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: n11
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      # Per-service passwords -- passed through so init.sh's heredoc can interpolate them:
      IDENTITY_DB_PASSWORD: ${IDENTITY_DB_PASSWORD}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD}
      INVENTORY_DB_PASSWORD: ${INVENTORY_DB_PASSWORD}
      CART_DB_PASSWORD: ${CART_DB_PASSWORD}
      ORDERS_DB_PASSWORD: ${ORDERS_DB_PASSWORD}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      SEARCH_DB_PASSWORD: ${SEARCH_DB_PASSWORD}
      AI_DB_PASSWORD: ${AI_DB_PASSWORD}
      MCP_DB_PASSWORD: ${MCP_DB_PASSWORD}
    volumes:
      # init.sh runs ONCE on first container boot (Postgres entrypoint convention).
      # Re-running requires `docker compose down -v` to discard postgres-data volume.
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d n11"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - n11-net

  rabbitmq:
    image: rabbitmq:4.3-management
    # rabbitmq:4.3-management = RabbitMQ 4.3 (current -- STACK.md / RESEARCH §3) plus
    # the management plugin (UI on :15672 for dev sanity checks). Default guest/guest
    # creds are DISABLED -- RABBITMQ_DEFAULT_USER/PASS override them.
    container_name: n11-rabbitmq
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"      # AMQP wire protocol (Phase 5+ services connect here)
      - "15672:15672"    # management UI -- http://localhost:15672 (dev only)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s   # rabbitmq 4.x cold-boot is ~10-15s on a warm Docker daemon
    restart: unless-stopped
    networks:
      - n11-net

  # ---------------------------------------------------------------------------
  # eureka-server -- Spring Cloud Netflix Eureka discovery server (ARCH-02).
  # The discovery root: api-gateway and every business service registers HERE.
  # Owned by Plan 01-05. Image built by `./gradlew :eureka-server:jibDockerBuild`.
  #
  # No depends_on -- eureka-server is independent (no `spring.config.import`, no
  # Eureka client config). The api-gateway (Plan 01-06) will declare
  # `depends_on: { eureka-server: { condition: service_healthy } }`.
  #
  # Healthcheck timing: start_period:15s + interval:5s x retries:6 = up to ~45s
  # before unhealthy -- fits within ROADMAP SC-1's 60-second budget once the Jib
  # image is in the local Docker daemon (cold-boot ~8-12s on a modern laptop).
  #
  # Healthcheck shell: `wget` (BusyBox utility shipped in eclipse-temurin:21-jre);
  # `curl` is NOT in the JRE base image. If a Phase-11 base-image change drops
  # wget, switch to a /dev/tcp probe in bash.
  # ---------------------------------------------------------------------------
  eureka-server:
    image: ${IMAGE_REGISTRY:-n11}/eureka-server:${IMAGE_TAG:-dev}
    container_name: n11-eureka-server
    profiles: ["full"]
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8761/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s
    restart: unless-stopped
    networks:
      - n11-net

  # ---------------------------------------------------------------------------
  # config-server -- Spring Cloud Config Server (CD-05 native profile, ARCH-03).
  # Serves config-repo from classpath:/config/ inside its JAR.
  # Owned by Plan 01-05. Image built by `./gradlew :config-server:jibDockerBuild`.
  #
  # SPRING_PROFILES_ACTIVE=native is baked into the Jib image's container env
  # (config-server/build.gradle.kts) but explicitly re-asserted here for the
  # `docker compose config` reader's benefit.
  #
  # No depends_on on eureka-server -- config-server in Phase 1 is NOT a Eureka
  # client (the gateway and business services route to it by hostname). Future
  # hardening could register it; out of scope for Phase 1.
  # ---------------------------------------------------------------------------
  config-server:
    image: ${IMAGE_REGISTRY:-n11}/config-server:${IMAGE_TAG:-dev}
    container_name: n11-config-server
    profiles: ["full"]
    environment:
      SPRING_PROFILES_ACTIVE: native
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8888/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s
    restart: unless-stopped
    networks:
      - n11-net

  # ---------------------------------------------------------------------------
  # api-gateway -- Spring Cloud Gateway 2025.0 Northfields, reactive WebFlux (ARCH-04, D-14).
  # Owned by Plan 01-06. Image built by `./gradlew :api-gateway:jibDockerBuild`.
  #
  # Bundle the build with eureka + config:
  #   ./gradlew :eureka-server:jibDockerBuild :config-server:jibDockerBuild :api-gateway:jibDockerBuild
  # (one Gradle invocation, three images -- the canonical Wave-2 launch sequence).
  #
  # depends_on: service_healthy on BOTH eureka-server and config-server. The gateway
  # registers with Eureka and pulls its config from config-server -- bringing it up
  # before either is healthy will trigger spring.config.import retry storms (max
  # ~30s window per api-gateway/src/main/resources/application.yml).
  #
  # Healthcheck: same wget-based pattern as eureka/config (eclipse-temurin:21-jre
  # ships BusyBox utilities including wget but NOT curl). Timing matches 01-05:
  # start_period:15s + interval:5s x retries:6 = ~45s tolerance, within SC-1 60s.
  #
  # SPRING_PROFILES_ACTIVE=docker hints to config-server that this is a docker-compose
  # consumer (no special profile-specific config in Phase 1, but reserved for Phase 11
  # tunnel config / production-like overrides).
  # ---------------------------------------------------------------------------
  api-gateway:
    image: ${IMAGE_REGISTRY:-n11}/api-gateway:${IMAGE_TAG:-dev}
    container_name: n11-api-gateway
    profiles: ["full"]
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888?fail-fast=true&max-attempts=10&max-interval=1500&multiplier=1.2&initial-interval=1100
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "9090:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s
    restart: unless-stopped
    networks:
      - n11-net

  # ---------------------------------------------------------------------------
  # identity-service -- first business service (Phase 3, D-21).
  # Port 8081 (gateway is 8080; 808x convention per ARCHITECTURE.md).
  # Image built by: ./gradlew :identity-service:jibDockerBuild
  #
  # IMPORTANT: NO `ports:` mapping -- Pitfall #14 (gateway path validation /
  # direct-service bypass). Identity-service is reachable ONLY through the
  # gateway on port 8080 from outside the Docker network.
  # ---------------------------------------------------------------------------
  identity-service:
    image: ${IMAGE_REGISTRY:-n11}/identity-service:${IMAGE_TAG:-dev}
    container_name: n11-identity-service
    profiles: ["full"]
    env_file:
      - .env
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888?fail-fast=true&max-attempts=10&max-interval=1500&multiplier=1.2&initial-interval=1100
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_PATH_PREFIX: /api/v1/identity
      # Plan 03-02 V2 admin-seed migration consumes ADMIN_SEED_EMAIL +
      # ADMIN_SEED_PASSWORD_HASH (loaded from .env via env_file above).
      # Plan 03-03 JwtConfig consumes JWT_PRIVATE_KEY + JWT_KEY_ID (same source).
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 20s    # Flyway migration adds ~5s vs infra services
    restart: unless-stopped
    networks:
      - n11-net

  # ---------------------------------------------------------------------------
  # product-service -- Phase 4 catalog (port 8082, 808x convention).
  # Image built by: ./gradlew :product-service:jibDockerBuild
  # NO `ports:` mapping — Pitfall #14 (internal-only on n11-net, gateway is the only entry).
  # ---------------------------------------------------------------------------
  product-service:
    image: ${IMAGE_REGISTRY:-n11}/product-service:${IMAGE_TAG:-dev}
    container_name: n11-product-service
    profiles: ["full"]
    env_file:
      - .env
