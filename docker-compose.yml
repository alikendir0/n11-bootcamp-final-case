      retries: 6
      start_period: 25s
    restart: unless-stopped
    networks:
      - n11-net

  # ---------------------------------------------------------------------------
  # payment-service -- Phase 6 (port 8086) — Iyzico Checkout Form integration.
  # Image: ./gradlew :payment-service:jibDockerBuild
  # Public REST: GET /payments/{orderId} (status/link), POST /payments/checkout
  # (idempotent ensure/fetch), POST /payments/iyzico/callback (public, allowlisted).
  # Saga consumer: stock.reserved → Iyzico initialize → PENDING checkout link.
  # Saga producer: payment.completed / payment.failed via callback retrieve.
  # ---------------------------------------------------------------------------
  payment-service:
    image: ${IMAGE_REGISTRY:-n11}/payment-service:${IMAGE_TAG:-dev}
    container_name: n11-payment-service
    profiles: ["full"]
    env_file:
      - .env
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888?fail-fast=true&max-attempts=10&max-interval=1500&multiplier=1.2&initial-interval=1100
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_PROFILES_ACTIVE: docker
      GATEWAY_PATH_PREFIX: /api/v1
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
