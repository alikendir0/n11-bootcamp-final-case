name: ci
# Secrets policy: SLACK_WEBHOOK_URL must be set as a GitHub Actions secret only.
# Never commit real webhook URLs, tokens, or registry credentials in this file.
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
      - name: Build & Test
        run: ./gradlew build --no-daemon

  infra-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
      - name: Run boundary smoke
        run: ./gradlew :infra-tests:test --no-daemon

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
      - name: Test
        run: npm test
        working-directory: frontend
      - name: Lint invariants
        run: npm run lint:invariants
        working-directory: frontend
      - name: E2E chat smoke
        run: npm run test:e2e -- chat-assistant.spec.ts
        working-directory: frontend

  notify:
    runs-on: ubuntu-latest
    needs: [build, infra-tests, frontend]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Slack notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        run: |
          if [ "${{ needs.build.result }}" == "success" ] && [ "${{ needs.infra-tests.result }}" == "success" ] && [ "${{ needs.frontend.result }}" == "success" ]; then
            TEXT="✅ build green on ${{ github.ref_name }}"
          else
            TEXT="❌ build failed on ${{ github.ref_name }}"
          fi
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"${TEXT}\"}" "$SLACK_WEBHOOK_URL"
