name: release-images
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - eureka-server
          - config-server
          - api-gateway
          - identity-service
          - product-service
          - inventory-service
          - cart-service
          - order-service
          - payment-service
          - notification-service
          - search-service
          - ai-service
          - mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image base
        run: echo "IMAGE_BASE=ghcr.io/${OWNER_REPO}/${{ matrix.service }}" >> "$GITHUB_ENV"
        env:
          OWNER_REPO: ${{ github.repository }}
      - name: Publish Jib image
        run: |
          ./gradlew :${{ matrix.service }}:jib --no-daemon \
            -Djib.to.image="${IMAGE_BASE}:${{ github.ref_name }}" \
            -Djib.to.tags=latest

  notify-release:
    runs-on: ubuntu-latest
    needs: publish
    if: always()
    steps:
      - name: Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ needs.publish.result }}" == "success" ]; then
            TEXT="✅ release images published on ${{ github.ref_name }}"
          else
            TEXT="❌ release image publish failed on ${{ github.ref_name }}"
          fi
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"${TEXT}\"}" "$SLACK_WEBHOOK_URL"
