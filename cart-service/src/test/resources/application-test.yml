# Test profile — disables Eureka/config-server lookup; Testcontainers Postgres
# supplies datasource via @ServiceConnection. Flyway runs the full V1+V2 chain
# against the test container so the schema is created.
spring:
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
  config:
    import: ""
  datasource:
    hikari:
      # Set search_path so unqualified native queries resolve to the cart schema.
      # In production this is set by init.sh for cart_user.
      connection-init-sql: "SET search_path = cart, public"
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: cart
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: cart
    default-schema: cart
    create-schemas: true     # Testcontainers: schema must be created (no init.sh in test container)
    placeholders:
      schema: cart
      flyway.schema: cart
  rabbitmq:
    listener:
      simple:
        auto-startup: false   # don't start consumers in unit tests

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
