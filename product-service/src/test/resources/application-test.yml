# Test profile — disables Eureka/config-server lookup; Testcontainers Postgres
# supplies datasource via @ServiceConnection. Flyway runs the full V1+V2+V3 chain
# against the test container so the seed data lands and the GIN index is created.
spring:
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
  config:
    import: ""
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: product
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: product
    default-schema: product
    create-schemas: true     # Testcontainers: schema must be created (no init.sh in test container)
    placeholders:
      schema: product
      flyway.schema: product
  rabbitmq:
    listener:
      simple:
        auto-startup: false   # don't start consumers in unit tests

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
