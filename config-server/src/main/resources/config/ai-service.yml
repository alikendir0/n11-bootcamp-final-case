# ---------------------------------------------------------------------------
# config-server/src/main/resources/config/ai-service.yml
# Per-service config for ai-service (Phase 8). Inherits shared baseline.
# ---------------------------------------------------------------------------

server:
  port: 8088

eureka:
  client:
    registry-fetch-interval-seconds: 5
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 8
    initial-instance-info-replication-interval-seconds: 5
  instance:
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    prefer-ip-address: true

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/n11
    username: ai_user
    password: ${AI_DB_PASSWORD}
    hikari:
      maximum-pool-size: 3                          # Pitfall #8 budget
      minimum-idle: 1
      connection-init-sql: SET search_path = ai, public

  flyway:
    enabled: true
    locations: classpath:db/migration/ai
    schemas: ai
    default-schema: ai
    create-schemas: false
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: ai

# No spring.rabbitmq -- ai-service has no AMQP in v1.
# Belt-and-braces: exclude AMQP auto-config (spring-amqp is runtimeOnly for class loading only).
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

ai:
  provider: gemini                                  # FLIP TO 'echo' to demo SOLID port substitution (D-04 / Plan 03 EchoChatProvider)
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model:
      chat: gemini-2.5-flash                         # gemini-3-flash-preview requires thought_signature support; use 2.5-flash for stable function calling
      chat-fallback: gemini-2.0-flash
      embedding: gemini-embedding-2
    embedding-dims: 768
  conversation:
    guest-ttl-minutes: 60                          # D-03 in-memory guest map TTL

app:
  clients:
    product:
      base-url: ${PRODUCT_SERVICE_BASE_URL:http://product-service:8082}
    cart:
      base-url: ${CART_SERVICE_BASE_URL:http://cart-service:8084}
    order:
      base-url: ${ORDER_SERVICE_BASE_URL:http://order-service:8085}
    payment:
      base-url: ${PAYMENT_SERVICE_BASE_URL:http://payment-service:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
