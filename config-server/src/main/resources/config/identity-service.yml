# ---------------------------------------------------------------------------
# config-server/src/main/resources/config/identity-service.yml
# Per-service config for the identity-service module (Phase 3, D-22).
# Inherits the shared baseline from .../config/application.yml.
# ---------------------------------------------------------------------------

server:
  port: 8081    # D-21 / 808x convention

eureka:
  client:
    registry-fetch-interval-seconds: 5
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 8
    initial-instance-info-replication-interval-seconds: 5
  instance:
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    prefer-ip-address: true

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/n11
    username: identity_user
    password: ${IDENTITY_DB_PASSWORD}
    hikari:
      maximum-pool-size: 10

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: identity
    default-schema: identity
    create-schemas: false
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    placeholders:
      schema: identity
      # flyway.schema used in V1 migration comment — must be defined to avoid Flyway
      # placeholder substitution error (V1 SQL comment references ${flyway.schema}).
      flyway.schema: identity
      adminSeedEmail: ${ADMIN_SEED_EMAIL}
      adminSeedPasswordHash: ${ADMIN_SEED_PASSWORD_HASH}
      mcpAgentSeedHash: ${MCP_AGENT_SEED_HASH:}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: identity

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_DEFAULT_USER}
    password: ${RABBITMQ_DEFAULT_PASS}

# JWT keypair env-var pass-through (D-02 / Pitfall #6) — NEVER PEM in YAML
jwt:
  private-key: ${JWT_PRIVATE_KEY}
  key-id: ${JWT_KEY_ID:n11-jwt-2026-04}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
